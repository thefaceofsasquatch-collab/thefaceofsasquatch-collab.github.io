<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Face of Sasquatch — Encounter Browser</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;500;600;700&display=swap');
:root{
  --dark:#0d1117;--card:#161b22;--border:#30363d;
  --green:#3fb950;--amber:#d29922;--red:#f85149;
  --blue:#58a6ff;--purple:#bc8cff;--muted:#8b949e;
  --text:#e6edf3;--accent:#c9a227;--hover:#1c2128;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--dark);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}

/* ── HEADER ── */
.header{text-align:center;padding:22px 16px 18px;border-bottom:1px solid var(--border)}
.header-inner{display:flex;align-items:center;justify-content:center;gap:18px;flex-wrap:wrap}
.header-logo{width:72px;height:72px;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 0 8px rgba(212,175,55,0.3))}
.header-text{text-align:left}
.header .eyebrow{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
.header h1{font-family:'Cinzel',serif;font-size:clamp(18px,3.5vw,30px);font-weight:900;color:#fff;letter-spacing:1px;margin:0}
.header h1 span{color:var(--accent)}
.header .sub{font-size:11px;color:var(--muted);margin-top:5px;letter-spacing:1px}
.badge{display:inline-block;background:#21262d;border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-size:11px;color:var(--accent);font-weight:600;margin-top:8px}

/* ── NAV TABS ── */
.nav{display:flex;gap:0;border-bottom:1px solid var(--border);max-width:1400px;margin:0 auto;padding:0 16px;align-items:center;justify-content:space-between}
.nav-left{display:flex;gap:0}
.nav-btn{padding:12px 24px;font-size:13px;font-weight:600;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;letter-spacing:.5px;transition:color .2s,border-color .2s}
.nav-btn:hover{color:var(--text)}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.nav-dashboard-link{padding:8px 18px;font-size:12px;font-weight:700;color:#0d1117;background:var(--accent);border:none;border-radius:6px;cursor:pointer;letter-spacing:.5px;text-decoration:none;display:inline-flex;align-items:center;gap:6px;margin-right:4px;white-space:nowrap;transition:opacity .2s}
.nav-dashboard-link:hover{opacity:.85}

/* ── VIEWS ── */
.view{display:none;max-width:1400px;margin:0 auto;padding:20px 16px 48px}
.view.active{display:block}

/* ── CONTROLS ── */
.controls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px;align-items:center}
.search-wrap{position:relative;flex:1;min-width:220px}
.search-wrap input{width:100%;background:#21262d;border:1px solid var(--border);border-radius:8px;padding:9px 14px 9px 36px;color:var(--text);font-size:13px;outline:none}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap .icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px}
select{background:#21262d;border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:12px;outline:none;cursor:pointer}
select:focus{border-color:var(--accent)}
.count-badge{font-size:12px;color:var(--muted);white-space:nowrap}
.clear-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--muted);font-size:12px;cursor:pointer}
.clear-btn:hover{color:var(--text);border-color:var(--text)}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:10px;max-height:calc(100vh - 200px);overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:700px}
thead th{background:#1c2128;padding:10px 12px;text-align:left;color:var(--muted);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none;position:sticky;top:0;z-index:10}
thead th:hover{color:var(--text)}
thead th.sorted-asc::after{content:' ▲';color:var(--accent)}
thead th.sorted-desc::after{content:' ▼';color:var(--accent)}
tbody tr{border-bottom:1px solid #21262d;transition:background .15s}
tbody tr:hover{background:var(--hover)}
tbody tr:last-child{border-bottom:none}
td{padding:10px 12px;vertical-align:top}
.td-title{max-width:260px}
.td-title a{color:var(--blue);text-decoration:none;font-weight:500}
.td-title a:hover{text-decoration:underline}
.td-title .channel-tag{display:block;font-size:10px;color:var(--muted);margin-top:3px}
.encounter-desc{display:block;font-size:11px;color:#adbac7;margin-top:5px;line-height:1.5;font-style:italic}
.tone-pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.5px}
.tone-Negative{background:#3d1a1a;color:#f85149}
.tone-Mixed{background:#3d2e0a;color:#d29922}
.tone-Neutral{background:#1e2630;color:#8b949e}
.tone-Positive{background:#0d2e1a;color:#3fb950}
.tone-Unknown{background:#21262d;color:#8b949e}
.chip-list{display:flex;flex-wrap:wrap;gap:3px;max-width:220px}
.chip{display:inline-block;background:#21262d;border:1px solid var(--border);border-radius:10px;padding:2px 7px;font-size:10px;color:var(--text)}
.chip.strange{background:#1e1030;border-color:#4a2080;color:#bc8cff}
.chip-clickable{cursor:pointer;transition:border-color .15s,background .15s}
.chip-clickable:hover{border-color:var(--accent);background:#2d2a1a;color:var(--accent)}
.chip.strange.chip-clickable:hover{border-color:#bc8cff;background:#2a1a40;color:#e0b8ff}
.deep-link{display:inline-block;margin-top:4px;font-size:10px;color:var(--amber);text-decoration:none;font-weight:600}
.deep-link:hover{text-decoration:underline}

/* ── PAGINATION ── */
.pagination{display:flex;align-items:center;gap:8px;margin-top:14px;justify-content:center;flex-wrap:wrap}
.page-btn{background:#21262d;border:1px solid var(--border);border-radius:6px;padding:6px 12px;color:var(--text);font-size:12px;cursor:pointer}
.page-btn:hover{border-color:var(--accent);color:var(--accent)}
.page-btn.active{background:var(--accent);color:#0d1117;border-color:var(--accent);font-weight:700}
.page-btn:disabled{opacity:.35;cursor:default}
.page-info{font-size:12px;color:var(--muted)}

/* ── CHANNEL PROFILE CARDS ── */
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.ch-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;cursor:pointer;transition:border-color .2s}
.ch-card:hover{border-color:var(--accent)}
.ch-card.selected{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.ch-name{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:#fff;margin-bottom:4px}
.ch-meta{font-size:11px;color:var(--muted);margin-bottom:14px}
.ch-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.ch-stat{background:#21262d;border-radius:6px;padding:8px;text-align:center}
.ch-stat-num{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:#fff}
.ch-stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.seg-bar{display:flex;height:16px;border-radius:4px;overflow:hidden;margin-bottom:6px}
.seg-bar div{height:100%;cursor:pointer;transition:opacity .15s}
.seg-bar div:hover{opacity:.75}
.seg-legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.seg-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}
.seg-lbl{font-size:10px;color:var(--muted)}
.mini-section{margin-top:10px}
.mini-title{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-weight:600}
.mini-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;cursor:pointer;border-radius:4px;padding:2px 4px;margin-left:-4px;transition:background .15s}
.mini-bar-row:hover{background:#21262d}
.mini-bar-row:hover .mini-bar-label{color:var(--accent)}
.mini-bar-label{font-size:10px;color:var(--text);min-width:140px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .15s}
.mini-bar-track{flex:1;background:#21262d;border-radius:3px;height:7px;overflow:hidden}
.mini-bar-fill{height:100%;border-radius:3px}
.mini-bar-val{font-size:10px;color:var(--muted);min-width:20px;text-align:right}
.strangeness-rate{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700;margin-bottom:10px}
.sr-high{background:#1e1030;color:#bc8cff;border:1px solid #4a2080}
.sr-med{background:#3d2e0a;color:#d29922;border:1px solid #6b4f10}
.sr-low{background:#0d2e1a;color:#3fb950;border:1px solid #1a5c2e}

/* ── COMPARE VIEW ── */
.compare-controls{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.compare-controls select{flex:1;min-width:200px}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:640px){.compare-grid{grid-template-columns:1fr}}
.compare-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px}
.compare-card.left{border-color:#58a6ff}
.compare-card.right{border-color:#bc8cff}
.compare-section{margin-top:16px}
.compare-section-title{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-weight:600}
.compare-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer;border-radius:4px;padding:2px 4px;margin-left:-4px;transition:background .15s}
.compare-bar-row:hover{background:#21262d}
.compare-bar-row:hover .compare-bar-label{color:var(--accent)}
.compare-bar-label{font-size:11px;color:var(--text);min-width:150px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .15s}
.compare-bar-track{flex:1;background:#21262d;border-radius:3px;height:8px;overflow:hidden}
.compare-bar-fill{height:100%;border-radius:3px}
.compare-bar-val{font-size:11px;color:var(--muted);min-width:24px;text-align:right}
.no-data{font-size:12px;color:var(--muted);font-style:italic;padding:12px 0}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:48px 16px;color:var(--muted);font-size:14px}

/* ── MOBILE RESPONSIVE ── */
@media(max-width:900px){
  .nav{flex-wrap:wrap;gap:6px;padding:8px 12px}
  .nav-btn{font-size:11px;padding:7px 10px}
  .controls{flex-direction:column;gap:8px}
  .search-wrap{min-width:100%;width:100%}
  select{width:100%}
  /* Hide the desktop table on mobile */
  .table-wrap table{display:none}
  /* Show mobile cards instead */
  .mobile-cards{display:block !important}
  .encounter-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
  .ec-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
  .ec-title a{color:var(--blue);text-decoration:none;font-weight:600;font-size:13px;line-height:1.4}
  .ec-meta{font-size:10px;color:var(--muted);margin-top:3px}
  .ec-desc{font-size:12px;color:#adbac7;line-height:1.6;font-style:italic;margin:8px 0}
  .ec-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
  .ec-section-label{font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-top:10px;margin-bottom:4px;font-weight:600}
  .ec-links{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
  .ec-links a{font-size:11px;font-weight:600;text-decoration:none}
  .ec-links a.watch{color:var(--blue)}
  .ec-links a.deep{color:var(--amber)}
  .ch-grid{grid-template-columns:1fr}
  .compare-grid{grid-template-columns:1fr}
  .compare-controls{flex-direction:column}
  .compare-controls select{width:100%}
}
@media(min-width:901px){
  .mobile-cards{display:none !important}
}
</style>
</head>

const SIGHTINGS = DB.sightings;

const FILTERS   = DB.filters;

// ── INIT ──────────────────────────────────────────────────────────────────────
document.getElementById('db-badge').textContent =
  DB.total_sightings + ' Encounters · ' + PROFILES.length + ' Channels · Generated ' + DB.generated;

// Populate filter dropdowns
function populateSelect(id, items) {
  const sel = document.getElementById(id);
  items.forEach(v => {
    const o = document.createElement('option');
    o.value = v; o.textContent = v;
    sel.appendChild(o);
  });
}
populateSelect('f-channel', FILTERS.channels);
populateSelect('f-tone',    FILTERS.tones);
populateSelect('f-region',  FILTERS.regions);
populateSelect('f-month',   FILTERS.months);

// Populate compare selects
['cmp-left','cmp-right'].forEach(id => {
  const sel = document.getElementById(id);
  PROFILES.forEach(p => {
    const o = document.createElement('option');
    o.value = p.channel_id; o.textContent = p.name;
    sel.appendChild(o);
  });
});

// ── VIEW SWITCHING ────────────────────────────────────────────────────────────
function showView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
}

// ── DRILL-DOWN FROM CHANNEL PROFILES ─────────────────────────────────────────
// filterType: 'behavior' | 'strangeness' | 'region' | 'tone'
// Switches to Sightings view, sets channel dropdown, and applies detail filter.
function drillTo(channelName, filterType, value) {
  // Switch to sightings view — find the nav button by text
  const navBtns = document.querySelectorAll('.nav-btn');
  let sightingsBtn = null;
  navBtns.forEach(b => { if (b.textContent.trim() === 'Sightings Database') sightingsBtn = b; });
  showView('sightings', sightingsBtn);

  // Set channel dropdown
  const chSel = document.getElementById('f-channel');
  const chOpts = Array.from(chSel.options);
  const chMatch = chOpts.find(o => o.value === channelName);
  chSel.value = chMatch ? chMatch.value : '';

  // Reset other filters first
  document.getElementById('kw-search').value = '';
  document.getElementById('f-tone').selectedIndex = 0;
  document.getElementById('f-region').selectedIndex = 0;
  document.getElementById('f-month').selectedIndex = 0;
  document.getElementById('f-strange').selectedIndex = 0;

  if (filterType === 'tone') {
    // Use the tone dropdown
    const tnSel = document.getElementById('f-tone');
    const tnOpts = Array.from(tnSel.options);
    const tnMatch = tnOpts.find(o => o.value.toLowerCase() === value.toLowerCase());
    if (tnMatch) tnSel.value = tnMatch.value;
  } else if (filterType === 'region') {
    // Use the region dropdown
    const rgSel = document.getElementById('f-region');
    const rgOpts = Array.from(rgSel.options);
    const rgMatch = rgOpts.find(o => o.value.toLowerCase() === value.toLowerCase());
    if (rgMatch) rgSel.value = rgMatch.value;
  } else {
    // behavior or strangeness: use keyword search (value is in _search blob)
    document.getElementById('kw-search').value = value;
  }

  applyFilters();
  // Scroll to top of sightings view
  document.getElementById('view-sightings').scrollIntoView({behavior:'smooth', block:'start'});
}

// Helper: called from data-type/data-val onclick elements inside [data-ch] cards
function drillFromRow(el) {
  const card = el.closest('[data-ch]');
  if (!card) return;
  const ch   = card.dataset.ch;
  const type = el.dataset.type;
  const val  = el.dataset.val;
  drillTo(ch, type, val);
}

// ── GLOBAL TAG FILTER ─────────────────────────────────────────────────────────
// Called when a behavior or strangeness chip is clicked anywhere in the sightings
// table or mobile cards. Filters ALL channels for that tag.
function filterByTag(type, value) {
  // Switch to sightings view
  const navBtns = document.querySelectorAll('.nav-btn');
  let sightingsBtn = null;
  navBtns.forEach(b => { if (b.textContent.trim() === 'Sightings Database') sightingsBtn = b; });
  showView('sightings', sightingsBtn);

  // Clear all filters
  document.getElementById('kw-search').value = '';
  document.getElementById('f-channel').selectedIndex = 0;
  document.getElementById('f-tone').selectedIndex = 0;
  document.getElementById('f-region').selectedIndex = 0;
  document.getElementById('f-month').selectedIndex = 0;
  document.getElementById('f-strange').selectedIndex = 0;

  if (type === 'tone') {
    const tnSel = document.getElementById('f-tone');
    const tnMatch = Array.from(tnSel.options).find(o => o.value.toLowerCase() === value.toLowerCase());
    if (tnMatch) tnSel.value = tnMatch.value;
  } else if (type === 'region') {
    const rgSel = document.getElementById('f-region');
    const rgMatch = Array.from(rgSel.options).find(o => o.value.toLowerCase() === value.toLowerCase());
    if (rgMatch) rgSel.value = rgMatch.value;
  } else {
    // behavior or strangeness — use keyword search
    document.getElementById('kw-search').value = value;
  }

  applyFilters();
  document.getElementById('view-sightings').scrollIntoView({behavior:'smooth', block:'start'});
}

// ── SIGHTINGS TABLE ───────────────────────────────────────────────────────────
let filtered   = [...SIGHTINGS];
let sortCol    = 'date';
let sortDir    = -1; // -1 = desc, 1 = asc
let currentPage = 1;
const PAGE_SIZE = 50;

function applyFilters() {
  const kw  = document.getElementById('kw-search').value.trim().toLowerCase();
  const ch  = document.getElementById('f-channel').value;
  const tn  = document.getElementById('f-tone').value;
  const rg  = document.getElementById('f-region').value;
  const mo  = document.getElementById('f-month').value;
  const st  = document.getElementById('f-strange').value;

  filtered = SIGHTINGS.filter(s => {
    if (kw && !s._search.includes(kw)) return false;
    if (ch && s.channel !== ch) return false;
    if (tn && s.tone !== tn) return false;
    if (rg && s.region !== rg) return false;
    if (mo && s.month !== mo) return false;
    if (st === 'yes' && s.strangeness.length === 0) return false;
    if (st === 'no'  && s.strangeness.length  > 0) return false;
    return true;
  });

  sortFiltered();
  currentPage = 1;
  renderTable();
}

function sortBy(col) {
  if (sortCol === col) { sortDir *= -1; }
  else { sortCol = col; sortDir = 1; }
  sortFiltered();
  renderTable();
}

function sortFiltered() {
  filtered.sort((a, b) => {
    let av = a[sortCol] || '', bv = b[sortCol] || '';
    if (av < bv) return -sortDir;
    if (av > bv) return  sortDir;
    return 0;
  });
  // Update header indicators
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.classList.remove('sorted-asc','sorted-desc');
    if (th.dataset.col === sortCol) {
      th.classList.add(sortDir === 1 ? 'sorted-asc' : 'sorted-desc');
    }
  });
}

function clearFilters() {
  document.getElementById('kw-search').value = '';
  ['f-channel','f-tone','f-region','f-month','f-strange'].forEach(id => {
    document.getElementById(id).selectedIndex = 0;
  });
  applyFilters();
}

function toneClass(tone) {
  const map = {Negative:'tone-Negative',Mixed:'tone-Mixed',Neutral:'tone-Neutral',Positive:'tone-Positive'};
  return map[tone] || 'tone-Unknown';
}

function renderTable() {
  const tbody = document.getElementById('sightings-body');
  const total = filtered.length;
  const pages = Math.ceil(total / PAGE_SIZE);
  const start = (currentPage - 1) * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);

  document.getElementById('result-count').textContent =
    total.toLocaleString() + ' encounter' + (total !== 1 ? 's' : '');
  document.getElementById('empty-msg').style.display = total === 0 ? 'block' : 'none';
  document.querySelector('.table-wrap').style.display = total === 0 ? 'none' : '';

  tbody.innerHTML = slice.map(s => {
    const deepLink = s.timestamp_url || s.url;
    const linkLabel = s.timestamp_url ? '▶ Deep Link' : '▶ Watch';
    const desc = s.description ? `<span class="encounter-desc">${esc(s.description)}</span>` : '';
    const behaviors = s.behaviors.slice(0,4).map(b =>
      `<span class="chip chip-clickable" onclick="filterByTag('behavior','${escAttr(b)}')" title="Filter all encounters: ${escAttr(b)}">${esc(b)}</span>`).join('');
    const strange = s.strangeness.map(st =>
      `<span class="chip strange chip-clickable" onclick="filterByTag('strangeness','${escAttr(st)}')" title="Filter all encounters: ${escAttr(st)}">${esc(st)}</span>`).join('');
    const subj = s.subjects.length ? `<div style="font-size:10px;color:var(--muted);margin-top:4px">${esc(s.subjects[0])}</div>` : '';
    return `<tr>
      <td style="white-space:nowrap;color:var(--muted)">${esc(s.date)}</td>
      <td style="white-space:nowrap;font-size:11px">${esc(s.channel)}</td>
      <td class="td-title">
        <a href="${esc(s.url)}" target="_blank">${esc(truncate(s.title,65))}</a>
        ${desc}
        ${subj}
        ${deepLink ? `<a class="deep-link" href="${esc(deepLink)}" target="_blank">${linkLabel} →</a>` : ''}
      </td>
      <td><span class="tone-pill ${toneClass(s.tone)}">${esc(s.tone)}</span></td>
      <td style="font-size:11px;color:var(--muted)">${esc(s.region)}</td>
      <td><div class="chip-list">${behaviors}</div></td>
      <td><div class="chip-list">${strange}</div></td>
    </tr>`;
  }).join('');

  // ── Mobile card layout ──────────────────────────────────────────
  const mobileDiv = document.getElementById('mobile-cards');
  mobileDiv.innerHTML = slice.map(s => {
    const deepLink = s.timestamp_url || s.url;
    const behaviors = s.behaviors.map(b => `<span class="chip chip-clickable" onclick="filterByTag('behavior','${escAttr(b)}')" title="Filter all encounters: ${escAttr(b)}">${esc(b)}</span>`).join('');
    const strange   = s.strangeness.map(st => `<span class="chip strange chip-clickable" onclick="filterByTag('strangeness','${escAttr(st)}')" title="Filter all encounters: ${escAttr(st)}">${esc(st)}</span>`).join('');
    const subj = s.subjects.length ? `<div style="font-size:10px;color:var(--muted);margin-top:4px">${esc(s.subjects[0])}</div>` : '';
    return `<div class="encounter-card">
      <div class="ec-header">
        <div class="ec-title">
          <a href="${esc(s.url)}" target="_blank">${esc(truncate(s.title,80))}</a>
          <div class="ec-meta">${esc(s.channel)} &middot; ${esc(s.date)} &middot; ${esc(s.region)}</div>
        </div>
        <span class="tone-pill ${toneClass(s.tone)}" style="flex-shrink:0">${esc(s.tone)}</span>
      </div>
      ${s.description ? `<div class="ec-desc">${esc(s.description)}</div>` : ''}
      ${subj}
      ${behaviors ? `<div class="ec-section-label">Behaviors</div><div class="ec-chips">${behaviors}</div>` : ''}
      ${strange   ? `<div class="ec-section-label">High Strangeness</div><div class="ec-chips">${strange}</div>` : ''}
      <div class="ec-links">
        <a class="watch" href="${esc(s.url)}" target="_blank">▶ Watch</a>
        ${deepLink && deepLink !== s.url ? `<a class="deep" href="${esc(deepLink)}" target="_blank">⏱ Deep Link</a>` : ''}
      </div>
    </div>`;
  }).join('');

  renderPagination(pages);
}

function renderPagination(pages) {
  const div = document.getElementById('pagination');
  if (pages <= 1) { div.innerHTML = ''; return; }
  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹ Prev</button>`;
  const range = pagRange(currentPage, pages);
  range.forEach(p => {
    if (p === '…') { html += `<span class="page-info">…</span>`; }
    else { html += `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`; }
  });
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>Next ›</button>`;
  html += `<span class="page-info">${((currentPage-1)*PAGE_SIZE+1).toLocaleString()}–${Math.min(currentPage*PAGE_SIZE,filtered.length).toLocaleString()} of ${filtered.length.toLocaleString()}</span>`;
  div.innerHTML = html;
}

function pagRange(cur, total) {
  if (total <= 7) return Array.from({length:total},(_,i)=>i+1);
  if (cur <= 4)   return [1,2,3,4,5,'…',total];
  if (cur >= total-3) return [1,'…',total-4,total-3,total-2,total-1,total];
  return [1,'…',cur-1,cur,cur+1,'…',total];
}

function goPage(p) {
  if (p < 1 || p > Math.ceil(filtered.length / PAGE_SIZE)) return;
  currentPage = p;
  renderTable();
  document.querySelector('.table-wrap').scrollIntoView({behavior:'smooth',block:'start'});
}

// ── CHANNEL PROFILES ──────────────────────────────────────────────────────────
function srClass(rate) {
  if (rate >= 50) return 'sr-high';
  if (rate >= 20) return 'sr-med';
  return 'sr-low';
}

function renderProfiles() {
  const kw = document.getElementById('ch-search').value.trim().toLowerCase();
  const list = kw ? PROFILES.filter(p => p.name.toLowerCase().includes(kw)) : PROFILES;
  document.getElementById('ch-count').textContent = list.length + ' channels';

  const grid = document.getElementById('ch-grid');
  grid.innerHTML = list.map(p => {
    const sc = p.sighting_count || 1;
    const negPct = p.neg_pct, mixPct = p.mix_pct, neuPct = p.neu_pct, posPct = p.pos_pct;

    const behaviorBars = (p.top_behaviors || []).slice(0,6).map(([b,v]) => {
      const pct = Math.round(v / sc * 100);
      return `<div class="mini-bar-row" data-type="behavior" data-val="${escAttr(b)}" onclick="drillFromRow(this)" title="${v} ${esc(b)} encounters">
        <span class="mini-bar-label">${esc(b)}</span>
        <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${pct}%;background:#3fb950"></div></div>
        <span class="mini-bar-val">${v}</span>
      </div>`;
    }).join('');

    const strangeBars = (p.top_strangeness || []).slice(0,5).map(([st,v]) => {
      const pct = Math.round(v / sc * 100);
      return `<div class="mini-bar-row" data-type="strangeness" data-val="${escAttr(st)}" onclick="drillFromRow(this)" title="${v} ${esc(st)} encounters">
        <span class="mini-bar-label">${esc(st)}</span>
        <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${pct}%;background:#bc8cff"></div></div>
        <span class="mini-bar-val">${v}</span>
      </div>`;
    }).join('');

    const regionBars = (p.top_regions || []).slice(0,4).map(([r,v]) => {
      const pct = Math.round(v / sc * 100);
      return `<div class="mini-bar-row" data-type="region" data-val="${escAttr(r)}" onclick="drillFromRow(this)" title="${v} ${esc(r)} encounters">
        <span class="mini-bar-label">${esc(r)}</span>
        <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${pct}%;background:#58a6ff"></div></div>
        <span class="mini-bar-val">${v}</span>
      </div>`;
    }).join('');

    return `<div class="ch-card" data-ch="${esc(p.name)}">
      <div class="ch-name">${esc(p.name)}</div>
      <div class="ch-meta">${p.video_count} videos · ${p.sighting_count} encounters</div>
      <span class="strangeness-rate ${srClass(p.strangeness_rate)}">
        ${p.strangeness_rate}% High Strangeness Rate
      </span>
      <div class="mini-title" style="margin-top:4px">Encounter Tone</div>
      <div class="seg-bar">
        <div style="width:${negPct}%;background:#f85149" data-type="tone" data-val="Negative" onclick="drillFromRow(this)" title="Negative encounters"></div>
        <div style="width:${mixPct}%;background:#d29922" data-type="tone" data-val="Mixed" onclick="drillFromRow(this)" title="Mixed encounters"></div>
        <div style="width:${neuPct}%;background:#8b949e" data-type="tone" data-val="Neutral" onclick="drillFromRow(this)" title="Neutral encounters"></div>
        <div style="width:${posPct}%;background:#3fb950" data-type="tone" data-val="Positive" onclick="drillFromRow(this)" title="Positive encounters"></div>
      </div>
      <div class="seg-legend">
        <span style="cursor:pointer" data-type="tone" data-val="Negative" onclick="drillFromRow(this)"><span class="seg-dot" style="background:#f85149"></span><span class="seg-lbl">Neg ${negPct}%</span></span>
        <span style="cursor:pointer" data-type="tone" data-val="Mixed" onclick="drillFromRow(this)"><span class="seg-dot" style="background:#d29922"></span><span class="seg-lbl">Mix ${mixPct}%</span></span>
        <span style="cursor:pointer" data-type="tone" data-val="Neutral" onclick="drillFromRow(this)"><span class="seg-dot" style="background:#8b949e"></span><span class="seg-lbl">Neu ${neuPct}%</span></span>
        <span style="cursor:pointer" data-type="tone" data-val="Positive" onclick="drillFromRow(this)"><span class="seg-dot" style="background:#3fb950"></span><span class="seg-lbl">Pos ${posPct}%</span></span>
      </div>
      ${behaviorBars ? `<div class="mini-section"><div class="mini-title">Top Behaviors <span style="font-size:8px;color:var(--accent);letter-spacing:0">(click to filter)</span></div>${behaviorBars}</div>` : ''}
      ${strangeBars  ? `<div class="mini-section"><div class="mini-title">High Strangeness Claims <span style="font-size:8px;color:var(--accent);letter-spacing:0">(click to filter)</span></div>${strangeBars}</div>` : ''}
      ${regionBars   ? `<div class="mini-section"><div class="mini-title">Top Regions <span style="font-size:8px;color:var(--accent);letter-spacing:0">(click to filter)</span></div>${regionBars}</div>` : ''}
    </div>`;
  }).join('');
}

// ── CHANNEL COMPARISON ────────────────────────────────────────────────────────
function renderCompare() {
  const lid = document.getElementById('cmp-left').value;
  const rid = document.getElementById('cmp-right').value;
  const grid = document.getElementById('compare-grid');

  const left  = PROFILES.find(p => p.channel_id === lid);
  const right = PROFILES.find(p => p.channel_id === rid);

  grid.innerHTML =
    buildCompareCard(left,  'left',  '#58a6ff') +
    buildCompareCard(right, 'right', '#bc8cff');
}

function buildCompareCard(p, side, accentColor) {
  if (!p) {
    const label = side === 'left' ? 'Channel A' : 'Channel B';
    return `<div class="compare-card ${side}" style="display:flex;align-items:center;justify-content:center;min-height:200px">
      <span style="color:var(--muted);font-size:13px">Select ${label} above</span>
    </div>`;
  }
  const sc = p.sighting_count || 1;

  const toneRows = [
    ['Negative', p.tones.Negative||0, '#f85149'],
    ['Mixed',    p.tones.Mixed||0,    '#d29922'],
    ['Neutral',  p.tones.Neutral||0,  '#8b949e'],
    ['Positive', p.tones.Positive||0, '#3fb950'],
  ].map(([label, val, color]) => {
    const pct = Math.round(val / sc * 100);
    return `<div class="compare-bar-row" data-type="tone" data-val="${label}" onclick="drillFromRow(this)" title="${label} encounters">
      <span class="compare-bar-label">${label}</span>
      <div class="compare-bar-track"><div class="compare-bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <span class="compare-bar-val">${val} <span style="color:var(--muted)">(${pct}%)</span></span>
    </div>`;
  }).join('');

  const behaviorRows = (p.top_behaviors||[]).slice(0,8).map(([b,v]) => {
    const pct = Math.round(v / sc * 100);
    return `<div class="compare-bar-row" data-type="behavior" data-val="${escAttr(b)}" onclick="drillFromRow(this)" title="${v} ${esc(b)} encounters">
      <span class="compare-bar-label">${esc(b)}</span>
      <div class="compare-bar-track"><div class="compare-bar-fill" style="width:${pct}%;background:${accentColor}"></div></div>
      <span class="compare-bar-val">${v}</span>
    </div>`;
  }).join('') || '<div class="no-data">No behavior data</div>';

  const strangeRows = (p.top_strangeness||[]).slice(0,6).map(([st,v]) => {
    const pct = Math.round(v / sc * 100);
    return `<div class="compare-bar-row" data-type="strangeness" data-val="${escAttr(st)}" onclick="drillFromRow(this)" title="${v} ${esc(st)} encounters">
      <span class="compare-bar-label">${esc(st)}</span>
      <div class="compare-bar-track"><div class="compare-bar-fill" style="width:${pct}%;background:#bc8cff"></div></div>
      <span class="compare-bar-val">${v}</span>
    </div>`;
  }).join('') || '<div class="no-data">No high strangeness data</div>';

  const regionRows = (p.top_regions||[]).slice(0,5).map(([r,v]) => {
    const pct = Math.round(v / sc * 100);
    return `<div class="compare-bar-row" data-type="region" data-val="${escAttr(r)}" onclick="drillFromRow(this)" title="${v} ${esc(r)} encounters">
      <span class="compare-bar-label">${esc(r)}</span>
      <div class="compare-bar-track"><div class="compare-bar-fill" style="width:${pct}%;background:#58a6ff"></div></div>
      <span class="compare-bar-val">${v}</span>
    </div>`;
  }).join('') || '<div class="no-data">No region data</div>';

  const evidenceRows = (p.top_evidence||[]).slice(0,5).map(([e,v]) => {
    const pct = Math.round(v / sc * 100);
    return `<div class="compare-bar-row" data-type="behavior" data-val="${escAttr(e)}" onclick="drillFromRow(this)" title="${v} ${esc(e)} encounters">
      <span class="compare-bar-label">${esc(e)}</span>
      <div class="compare-bar-track"><div class="compare-bar-fill" style="width:${pct}%;background:#d29922"></div></div>
      <span class="compare-bar-val">${v}</span>
    </div>`;
  }).join('') || '<div class="no-data">No evidence data</div>';

  return `<div class="compare-card ${side}" data-ch="${esc(p.name)}">
    <div class="ch-name" style="color:${accentColor}">${esc(p.name)}</div>
    <div class="ch-meta">${p.video_count} videos · ${p.sighting_count} encounters</div>
    <div class="ch-stats">
      <div class="ch-stat">
        <div class="ch-stat-num">${p.neg_pct}%</div>
        <div class="ch-stat-lbl">Negative</div>
      </div>
      <div class="ch-stat">
        <div class="ch-stat-num">${p.strangeness_rate}%</div>
        <div class="ch-stat-lbl">Strangeness</div>
      </div>
      <div class="ch-stat">
        <div class="ch-stat-num">${p.pos_pct}%</div>
        <div class="ch-stat-lbl">Positive</div>
      </div>
    </div>
    <div class="compare-section">
      <div class="compare-section-title">Encounter Tone</div>
      ${toneRows}
    </div>
    <div class="compare-section">
      <div class="compare-section-title">Top Behaviors</div>
      ${behaviorRows}
    </div>
    <div class="compare-section">
      <div class="compare-section-title">High Strangeness Claims</div>
      ${strangeRows}
    </div>
    <div class="compare-section">
      <div class="compare-section-title">Regional Distribution</div>
      ${regionRows}
    </div>
    <div class="compare-section">
      <div class="compare-section-title">Evidence Types</div>
      ${evidenceRows}
    </div>
  </div>`;
}

// ── UTILITIES ────────────────────────────────────────────────────────────────
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
// escAttr: safe for use in HTML attribute values (escapes quotes and apostrophes)
function escAttr(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function truncate(s, n) {
  if (!s) return '';
  return s.length > n ? s.slice(0, n) + '…' : s;
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
// Parse URL query parameters and pre-set filters for deep linking
// Supported params: tone, channel, region, month, strange, kw
(function applyURLParams() {
  const params = new URLSearchParams(window.location.search);
  const setVal = (id, val) => {
    if (!val) return;
    const el = document.getElementById(id);
    if (!el) return;
    // Try to match option value (case-insensitive)
    const opts = Array.from(el.options);
    const match = opts.find(o => o.value.toLowerCase() === val.toLowerCase());
    if (match) el.value = match.value;
  };
  setVal('f-tone',    params.get('tone'));
  setVal('f-channel', params.get('channel'));
  setVal('f-region',  params.get('region'));
  setVal('f-month',   params.get('month'));
  setVal('f-strange', params.get('strange'));
  const kw = params.get('kw');
  if (kw) document.getElementById('kw-search').value = kw;
})();

applyFilters();
renderProfiles();
</script>
