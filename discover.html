<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Discover — The Face of Sasquatch</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;500;600;700&display=swap');
  :root {
    --dark:#0d1117; --card:#161b22; --border:#30363d;
    --green:#3fb950; --amber:#d29922; --red:#f85149;
    --blue:#58a6ff; --purple:#bc8cff; --muted:#8b949e;
    --text:#e6edf3; --accent:#c9a227;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--dark);color:var(--text);font-family:'Inter',sans-serif;overflow-x:hidden}
  body{display:flex;flex-direction:column;min-height:100vh}

  /* ── Header ── */
  .hdr{background:#0d1117;border-bottom:1px solid var(--border);padding:12px 16px;flex-shrink:0}
  .hdr-inner{display:flex;align-items:center;gap:12px;max-width:600px;margin:0 auto}
  .hdr-logo{width:44px;height:44px;object-fit:contain;filter:drop-shadow(0 0 6px rgba(212,175,55,.4));flex-shrink:0}
  .hdr-text{flex:1;min-width:0}
  .hdr-title{font-family:'Cinzel',serif;font-size:15px;font-weight:900;color:#fff;letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hdr-title span{color:var(--accent)}
  .hdr-sub{font-size:10px;color:var(--muted);margin-top:2px}
  .hdr-dash{flex-shrink:0}
  .hdr-dash a{font-size:11px;color:var(--muted);text-decoration:none;padding:5px 10px;border:1px solid var(--border);border-radius:6px;white-space:nowrap}
  .hdr-dash a:hover{color:var(--accent);border-color:var(--accent)}

  /* ── Tone filter bar ── */
  .tone-bar{background:#0d1117;border-bottom:1px solid var(--border);padding:10px 16px;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tone-bar-inner{display:flex;gap:8px;max-width:600px;margin:0 auto;align-items:center}
  .tone-pill{display:inline-block;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px;cursor:pointer;border:1.5px solid transparent;transition:all .15s;white-space:nowrap;user-select:none}
  .tp-all{background:#21262d;color:var(--muted);border-color:var(--border)}
  .tp-all.active{background:#2d333b;color:var(--text);border-color:var(--text)}
  .tp-neg{background:#3d1a1a;color:#f85149}
  .tp-neg.active{border-color:#f85149;box-shadow:0 0 0 1px #f85149}
  .tp-mix{background:#3d2e0a;color:#d29922}
  .tp-mix.active{border-color:#d29922;box-shadow:0 0 0 1px #d29922}
  .tp-neu{background:#1e2630;color:#8b949e}
  .tp-neu.active{border-color:#8b949e;box-shadow:0 0 0 1px #8b949e}
  .tp-pos{background:#0d2e1a;color:#3fb950}
  .tp-pos.active{border-color:#3fb950;box-shadow:0 0 0 1px #3fb950}

  /* ── Card area ── */
  .card-area{flex:1;overflow-y:auto;padding:16px 16px 140px 16px;-webkit-overflow-scrolling:touch}
  .card-wrap{max-width:600px;margin:0 auto}

  /* ── Encounter card ── */
  .enc-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px}
  .enc-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px}
  .enc-channel{color:var(--accent);font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
  .enc-date{font-size:11px;color:var(--muted);margin-top:2px}
  .enc-tone-pill{display:inline-block;padding:3px 10px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.5px;flex-shrink:0}
  .enc-title{margin-bottom:10px}
  .enc-title a{color:var(--blue);text-decoration:none;font-size:14px;font-weight:600;line-height:1.4;display:block}
  .enc-title a:hover{text-decoration:underline}
  .enc-meta{font-size:11px;color:var(--muted);margin-bottom:12px}
  .enc-thumb{width:100%;height:auto;border-radius:8px;margin-top:14px;display:block;background:#21262d}

  /* ── Sighting within card ── */
  .sighting-block{border-top:1px solid #21262d;padding-top:12px;margin-top:12px}
  .sighting-block:first-child{border-top:none;padding-top:0;margin-top:0}
  .sight-num{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-weight:600}
  .sight-desc{font-size:12px;color:#adbac7;font-style:italic;line-height:1.6;margin-bottom:8px}
  .chip-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
  .beh-chip{display:inline-block;background:#21262d;border:1px solid #30363d;border-radius:10px;padding:2px 8px;font-size:10px;color:#e6edf3;cursor:pointer;-webkit-tap-highlight-color:transparent}
  .beh-chip:hover,.beh-chip:active{border-color:#d29922;color:#d29922}
  .beh-chip.tag-active{border-color:#d29922;color:#d29922;background:#2a2010}
  .str-chip{display:inline-block;background:#1e1030;border:1px solid #4a2080;border-radius:10px;padding:2px 8px;font-size:10px;color:#bc8cff;cursor:pointer;-webkit-tap-highlight-color:transparent}
  .str-chip:hover,.str-chip:active{border-color:#bc8cff;background:#2a1a40}
  .str-chip.tag-active{border-color:#bc8cff;background:#2a1a40}
  /* ── Active tag banner ── */
  .tag-banner{display:none;align-items:center;justify-content:space-between;gap:8px;background:#1a1a2e;border:1px solid #4a2080;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:11px;color:#bc8cff;max-width:600px;margin-left:auto;margin-right:auto}
  .tag-banner.visible{display:flex}
  .tag-banner-text{flex:1;line-height:1.4}
  .tag-banner-browse{color:#d29922;text-decoration:none;font-weight:700;white-space:nowrap;font-size:11px}
  .tag-banner-browse:hover{text-decoration:underline}
  .tag-banner-clear{background:none;border:none;color:#8b949e;cursor:pointer;font-size:14px;padding:0 4px;line-height:1}
  .deep-link{display:inline-block;margin-top:4px;font-size:11px;color:#d29922;text-decoration:none;font-weight:600}
  .deep-link:hover{text-decoration:underline}

  /* ── Empty state ── */
  .empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
  .empty-state h3{font-family:'Cinzel',serif;color:var(--accent);margin-bottom:10px}

  /* ── Navigation bar — fixed to bottom of viewport ── */
  .nav-bar{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    z-index:100;
    background:#0d1117;
    border-top:2px solid var(--border);
    padding:10px 16px;
    padding-bottom:max(10px, env(safe-area-inset-bottom));
    box-shadow:0 -4px 20px rgba(0,0,0,.6);
  }
  .nav-inner{display:flex;align-items:center;gap:8px;max-width:600px;margin:0 auto}
  .nav-btn{flex:1;padding:13px 8px;border-radius:10px;border:1px solid var(--border);background:#21262d;color:var(--text);font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center;-webkit-tap-highlight-color:transparent;min-height:48px}
  .nav-btn:hover,.nav-btn:active{background:#2d333b;border-color:var(--accent)}
  .nav-btn:disabled{opacity:.35;cursor:default}
  .nav-btn.rand{background:#1a2a1a;border-color:#3fb950;color:#3fb950}
  .nav-btn.rand:hover,.nav-btn.rand:active{background:#1e3a1e}
  .nav-progress{font-size:10px;color:var(--muted);text-align:center;margin-top:6px;max-width:600px;margin-left:auto;margin-right:auto}

  /* ── Random scope toggle ── */
  .rand-scope{display:flex;align-items:center;gap:6px;justify-content:center;margin-top:6px;max-width:600px;margin-left:auto;margin-right:auto}
  .rand-label{font-size:10px;color:var(--muted)}
  .scope-toggle{display:flex;background:#21262d;border:1px solid var(--border);border-radius:20px;overflow:hidden}
  .scope-btn{padding:3px 12px;font-size:10px;font-weight:600;cursor:pointer;color:var(--muted);border:none;background:transparent;transition:all .15s;-webkit-tap-highlight-color:transparent}
  .scope-btn.active{background:var(--green);color:#0d1117}
</style>
</head>

const LATEST_RUN_DATE = "2026-05-10";

// ── State ─────────────────────────────────────────────────────────────────────
let activeTone  = '';
let activeTag   = '';   // behavior or strangeness tag filter
let randScope   = 'all';
let sequence    = [];   // filtered video indices into VIDEOS
let currentIdx  = 0;    // index into sequence
let navHistory  = [];   // stack of previously viewed sequence indices (for Back)

// ── Tone colors ───────────────────────────────────────────────────────────────
const TONE_STYLE = {
  'Negative': 'background:#3d1a1a;color:#f85149',
  'Mixed':    'background:#3d2e0a;color:#d29922',
  'Neutral':  'background:#1e2630;color:#8b949e',
  'Positive': 'background:#0d2e1a;color:#3fb950',
};

function tonePill(tone) {
  const st = TONE_STYLE[tone] || 'background:#21262d;color:#8b949e';
  return `<span class="enc-tone-pill" style="${st}">${tone || 'Unknown'}</span>`;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(d) {
  if (!d) return '';
  try {
    const [y,m,day] = d.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[parseInt(m)-1] + ' ' + parseInt(day) + ', ' + y;
  } catch(e) { return d; }
}

function deepLinkLabel(ts) {
  if (!ts && ts !== 0) return '';
  const s = parseInt(ts);
  const m = Math.floor(s/60), sec = s%60;
  return m + ':' + String(sec).padStart(2,'0');
}

// ── Build sequence (round-robin by channel so no two consecutive from same channel) ──
function videoHasTag(v, tag) {
  if (!tag) return true;
  const allTags = [];
  (v.sightings || []).forEach(s => {
    (s.behaviors || []).forEach(b => allTags.push(b));
    (s.strangeness || []).forEach(b => allTags.push(b));
  });
  return allTags.includes(tag);
}

function buildSequence() {
  // 1. Filter by active tone AND active tag
  const filtered = [];
  for (let i = 0; i < VIDEOS.length; i++) {
    const v = VIDEOS[i];
    if (activeTone && v.tone !== activeTone) continue;
    if (activeTag && !videoHasTag(v, activeTag)) continue;
    filtered.push(i);
  }

  // 2. Group filtered indices by channel, preserving newest-first order within each channel
  const channelQueues = {};
  const channelOrder = [];
  for (const i of filtered) {
    const ch = VIDEOS[i].channel;
    if (!channelQueues[ch]) {
      channelQueues[ch] = [];
      channelOrder.push(ch);
    }
    channelQueues[ch].push(i);
  }

  // 3. Round-robin: take one from each channel in turn until all are exhausted
  sequence = [];
  let remaining = channelOrder.filter(ch => channelQueues[ch].length > 0);
  while (remaining.length > 0) {
    for (const ch of [...remaining]) {
      sequence.push(channelQueues[ch].shift());
    }
    remaining = channelOrder.filter(ch => channelQueues[ch].length > 0);
  }
}

// ── Render card ───────────────────────────────────────────────────────────────
function renderCard() {
  const wrap = document.getElementById('card-wrap');
  const prog = document.getElementById('nav-progress');

  if (sequence.length === 0) {
    wrap.innerHTML = `<div class="empty-state"><h3>No Encounters</h3><p>No videos match the selected tone filter.</p></div>`;
    prog.textContent = '';
    document.getElementById('btn-back').disabled = true;
    document.getElementById('btn-next').disabled = true;
    return;
  }

  const vidIdx = sequence[currentIdx];
  const v = VIDEOS[vidIdx];
  const nSightings = v.sightings.length;

  // Build sighting blocks
  let sightingHtml = '';
  let chipsHtml = '';
  v.sightings.forEach((s, i) => {
    const numLabel = nSightings > 1 ? `<div class="sight-num">Sighting ${i+1} of ${nSightings}</div>` : '';
    const desc = s.description
      ? `<div class="sight-desc">${esc(s.description)}</div>`
      : '';
    const behChips = (s.behaviors||[]).map(b => `<span class="beh-chip${activeTag===b?' tag-active':''}" onclick="filterByTag('${esc(b)}')">${esc(b)}</span>`).join('');
    const strChips = (s.strangeness||[]).map(b => `<span class="str-chip${activeTag===b?' tag-active':''}" onclick="filterByTag('${esc(b)}')">${esc(b)}</span>`).join('');
    const chipRows = (behChips || strChips)
      ? `<div class="chip-row">${behChips}${strChips}</div>`
      : '';
    const dl = s.timestamp_url
      ? `<a class="deep-link" href="${esc(s.timestamp_url)}" target="_blank" rel="noopener">&#9658; Deep Link @ ${deepLinkLabel(s.timestamp_seconds)} &#8594;</a>`
      : '';
    sightingHtml += `<div class="sighting-block">${numLabel}${dl}${desc}</div>`;
    chipsHtml += chipRows;
  });

  const regionStr = (v.region && v.region !== 'Unknown / Not stated' && v.region !== 'Unknown')
    ? ` &middot; ${esc(v.region)}` : '';

  wrap.innerHTML = `
    <div class="enc-card">
      <div class="enc-header">
        <div>
          <div class="enc-channel">${esc(v.channel)}</div>
          <div class="enc-date">${fmtDate(v.date)}${regionStr}</div>
        </div>
        ${tonePill(v.tone)}
      </div>
      <div class="enc-title">
        <a href="${esc(v.url)}" target="_blank" rel="noopener">${esc(v.title)}</a>
      </div>
      <div class="enc-meta">${nSightings} sighting${nSightings !== 1 ? 's' : ''} in this video</div>
      ${sightingHtml}
      <a href="${esc(v.url)}" target="_blank" rel="noopener">
        <img class="enc-thumb"
          src="https://img.youtube.com/vi/${esc(v.video_id)}/mqdefault.jpg"
          alt="Video thumbnail"
          loading="lazy"
          onerror="this.style.display='none'">
      </a>
      ${chipsHtml}
    </div>`;

  // Progress
  prog.textContent = `Video ${currentIdx + 1} of ${sequence.length}`;

  // Button states
  document.getElementById('btn-back').disabled = navHistory.length === 0;
  document.getElementById('btn-next').disabled = currentIdx === sequence.length - 1;

  // Scroll card area to top
  document.getElementById('card-area').scrollTop = 0;
}

// ── Navigation ────────────────────────────────────────────────────────────────────────────────
function goTo(newIdx) {
  // Push current position onto history before moving
  navHistory.push(currentIdx);
  currentIdx = newIdx;
  renderCard();
}

function navigate(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= sequence.length) return;
  goTo(newIdx);
}

function goBack() {
  if (navHistory.length === 0) return;
  currentIdx = navHistory.pop();
  renderCard(); // don't push to history on back
}

function randomPick() {
  if (sequence.length === 0) return;
  let pool;
  if (randScope === 'newest') {
    pool = sequence.filter(i => VIDEOS[i].is_newest);
    if (pool.length === 0) pool = sequence;
  } else {
    pool = sequence;
  }
  // Avoid picking the same video we're already on
  const others = pool.filter(i => i !== sequence[currentIdx]);
  const pick = (others.length > 0 ? others : pool)[Math.floor(Math.random() * (others.length > 0 ? others : pool).length)];
  goTo(sequence.indexOf(pick));
}

// ── Tone filter ───────────────────────────────────────────────────────────────
function setTone(tone) {
  activeTone = tone;
  document.querySelectorAll('.tone-pill').forEach(el => el.classList.remove('active'));
  const map = {'':'tp-all','Negative':'tp-neg','Mixed':'tp-mix','Neutral':'tp-neu','Positive':'tp-pos'};
  document.querySelector('.' + map[tone]).classList.add('active');
  buildSequence();
  currentIdx = 0;
  navHistory = [];
  renderCard();
}

// ── Tag filter ────────────────────────────────────────────────────────────────
function filterByTag(tag) {
  if (activeTag === tag) {
    // Tapping the same tag again clears the filter
    activeTag = '';
    updateTagBanner();
    buildSequence();
    currentIdx = 0;
    navHistory = [];
    renderCard();
    return;
  }
  activeTag = tag;
  buildSequence();
  // Count matching videos
  const count = sequence.length;
  // Jump to a random one
  if (count > 0) {
    currentIdx = Math.floor(Math.random() * count);
  } else {
    currentIdx = 0;
  }
  navHistory = [];
  updateTagBanner();
  renderCard();
}

function updateTagBanner() {
  const banner = document.getElementById('tag-banner');
  if (!activeTag) {
    banner.classList.remove('visible');
    return;
  }
  const count = sequence.length;
  const browseUrl = 'browser.html?behaviors=' + encodeURIComponent(activeTag);
  document.getElementById('tag-banner-text').innerHTML =
    `&#127991; <strong>${esc(activeTag)}</strong> &mdash; ${count} video${count !== 1 ? 's' : ''}`;
  document.getElementById('tag-banner-browse').href = browseUrl;
  banner.classList.add('visible');
}

function clearTagFilter() {
  activeTag = '';
  updateTagBanner();
  buildSequence();
  currentIdx = 0;
  navHistory = [];
  renderCard();
}

// ── Random scope toggle ───────────────────────────────────────────────────────
function setScope(scope) {
  randScope = scope;
  document.getElementById('scope-all').classList.toggle('active', scope === 'all');
  document.getElementById('scope-new').classList.toggle('active', scope === 'newest');
}

// ── Swipe support ─────────────────────────────────────────────────────────────
let touchStartX = 0;
let touchStartY = 0;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive: true});
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    if (dx < 0) navigate(1);   // swipe left = Next
    else goBack();             // swipe right = Back (history-aware)
  }
}, {passive: true});

// ── Init ──────────────────────────────────────────────────────────────────────
buildSequence();
renderCard();
</script>
